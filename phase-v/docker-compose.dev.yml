version: "3.8"

# ============================================================
# LOCAL DEV — docker-compose.dev.yml
#
# - No pre-built images needed — builds from Dockerfiles
# - Source code mounted as volumes → hot reload on save
# - Backend/Python: uvicorn --reload
# - Frontend: npm run dev (HMR enabled)
# - All infra (Kafka, Redis, Dapr) runs as containers
# ============================================================

services:

  # ==================== Infrastructure ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - todo-dev-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 10
    networks:
      - todo-dev-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - todo-dev-network

  dapr-placement:
    image: daprio/dapr:1.13.0
    container_name: dapr-placement
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"
    networks:
      - todo-dev-network

  # ==================== Backend (FastAPI) — hot reload ====================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app          # mount source → changes reload instantly
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - FRONTEND_URL=http://localhost:3000
      - DAPR_HTTP_PORT=3500
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - todo-dev-network

  backend-dapr:
    image: daprio/daprd:1.13.0
    container_name: backend-dapr-dev
    command:
      - "./daprd"
      - "--app-id"
      - "backend"
      - "--app-port"
      - "8000"
      - "--dapr-http-port"
      - "3500"
      - "--components-path"
      - "/dapr/components"
      - "--placement-host-address"
      - "dapr-placement:50006"
      - "--log-level"
      - "warn"
    volumes:
      - ./dapr/components:/dapr/components:ro
    network_mode: "service:backend"
    depends_on:
      - backend
      - dapr-placement

  # ==================== Notification Service — hot reload ====================

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./notification-service/app:/app/app
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - DAPR_HTTP_PORT=3501
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - todo-dev-network

  notification-service-dapr:
    image: daprio/daprd:1.13.0
    container_name: notification-service-dapr-dev
    command:
      - "./daprd"
      - "--app-id"
      - "notification-service"
      - "--app-port"
      - "8001"
      - "--dapr-http-port"
      - "3501"
      - "--components-path"
      - "/dapr/components"
      - "--placement-host-address"
      - "dapr-placement:50006"
      - "--log-level"
      - "warn"
    volumes:
      - ./dapr/components:/dapr/components:ro
    network_mode: "service:notification-service"
    depends_on:
      - notification-service
      - dapr-placement

  # ==================== Scheduler Service — hot reload ====================

  scheduler-service:
    build:
      context: ./scheduler-service
      dockerfile: Dockerfile
    container_name: scheduler-service-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./scheduler-service/app:/app/app
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    environment:
      - DAPR_HTTP_PORT=3502
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - todo-dev-network

  scheduler-service-dapr:
    image: daprio/daprd:1.13.0
    container_name: scheduler-service-dapr-dev
    command:
      - "./daprd"
      - "--app-id"
      - "scheduler-service"
      - "--app-port"
      - "8002"
      - "--dapr-http-port"
      - "3502"
      - "--components-path"
      - "/dapr/components"
      - "--placement-host-address"
      - "dapr-placement:50006"
      - "--log-level"
      - "warn"
    volumes:
      - ./dapr/components:/dapr/components:ro
    network_mode: "service:scheduler-service"
    depends_on:
      - scheduler-service
      - dapr-placement

  # ==================== Frontend (Next.js) — npm run dev ====================

  frontend:
    image: node:20-alpine
    container_name: todo-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app                 # mount source → HMR works
      - frontend_node_modules:/app/node_modules  # keep node_modules in volume
    ports:
      - "3000:3000"
    environment:
      # BACKEND_URL   → used by SSR / API routes inside Docker
      - BACKEND_URL=http://backend:8000
      # NEXT_PUBLIC_* → used by browser (reaches host machine's port mapping)
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BETTER_AUTH_SECRET=2adQ901mBtenedKzUqiuRNjcieJ1j2UsxtXIKbi_8y0
      - NODE_ENV=development
      - WATCHPACK_POLLING=true          # required for file watching inside Docker on Windows
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todo-dev-network

networks:
  todo-dev-network:
    driver: bridge

volumes:
  frontend_node_modules:               # persists node_modules between restarts
